name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Extract version from pyproject.toml
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          VERSION=$(python3 -c "import re, pathlib; text = pathlib.Path('pyproject.toml').read_text(); m = re.search(r'version = \"(.+?)\"', text); print(m.group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # Build sdist and pure-Python wheel
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Build sdist and wheel
        run: |
          uv pip install build twine
          uv run python tools.py --wheel

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: wheel/

  # Build dependency wheels for each platform
  # Platforms limited to intersection of pymcurl and quickjs-ng wheel availability
  wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            image: "quay.io/pypa/manylinux2014_x86_64"
            name: linux-glibc-x86_64
          - os: ubuntu-24.04-arm
            image: "quay.io/pypa/manylinux2014_aarch64"
            name: linux-glibc-aarch64
          - os: ubuntu-latest
            image: "quay.io/pypa/musllinux_1_2_x86_64"
            name: linux-musl-x86_64
          - os: ubuntu-24.04-arm
            image: "quay.io/pypa/musllinux_1_2_aarch64"
            name: linux-musl-aarch64
          - os: macos-latest
            name: mac-arm64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}
    name: wheels ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v7

      - name: Build wheels (Linux container)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v ${{ github.workspace }}:/px -w /px \
            ${{ matrix.image }} /bin/bash -c '. /px/build.sh && build_wheels'

      - name: Build wheels (macOS/Windows)
        if: runner.os != 'Linux'
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.14"

      - name: Build wheels (macOS/Windows) - continue
        if: runner.os != 'Linux'
        shell: bash
        run: . ./build.sh && build_wheels

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.name }}
          path: wheels/

  # Build Nuitka binaries (Linux/macOS) or embedded Python (Windows)
  binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            image: "quay.io/pypa/manylinux2014_x86_64"
            name: linux-glibc-x86_64
          - os: ubuntu-24.04-arm
            image: "quay.io/pypa/manylinux2014_aarch64"
            name: linux-glibc-aarch64
          - os: ubuntu-latest
            image: "alpine:3.21"
            name: linux-musl-x86_64
            alpine: true
          - os: ubuntu-24.04-arm
            image: "alpine:3.21"
            name: linux-musl-aarch64
            alpine: true
          - os: macos-latest
            name: mac-arm64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}
    name: binary ${{ matrix.name }}
    needs: [sdist, wheels]

    steps:
      - uses: actions/checkout@v7

      - name: Set up the environment
        if: runner.os != 'Linux'
        uses: ./.github/actions/setup-python-env

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-${{ matrix.name }}
          path: px.dist-${{ matrix.name }}-wheels/px.dist/

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: wheel/

      - name: Build Nuitka binary (Linux)
        if: runner.os == 'Linux'
        run: |
          SHELL_BIN="${{ matrix.alpine && '/bin/sh' || '/bin/bash' }}"
          docker run --rm -v ${{ github.workspace }}:/px -w /px \
            ${{ matrix.image }} $SHELL_BIN -c '. /px/build.sh && build_binary ${{ matrix.name }}'

      - name: Build Nuitka binary (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: . ./build.sh && build_binary ${{ matrix.name }}

      - name: Build embedded binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: . ./build.sh && build_binary ${{ matrix.name }}

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.name }}
          path: |
            px.dist-*/px-v*

  # Test built artifacts across distros
  test-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            container: "quay.io/pypa/musllinux_1_2_x86_64"
            name: linux-musl-x86_64
          - os: ubuntu-24.04-arm
            container: "quay.io/pypa/musllinux_1_2_aarch64"
            name: linux-musl-aarch64
          - os: ubuntu-latest
            container: ubuntu
            name: linux-glibc-x86_64
          - os: ubuntu-24.04-arm
            container: ubuntu
            name: linux-glibc-aarch64
          - os: macos-latest
            name: mac-arm64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}
    name: test-binary ${{ matrix.name }} ${{ matrix.container }}
    needs: [binary]

    steps:
      - uses: actions/checkout@v7

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          name: binary-${{ matrix.name }}
          path: ./

      - name: Extract archives
        shell: bash
        run: . ./build.sh && extract_archives ${{ matrix.name }}

      - name: Set up the environment
        if: runner.os != 'Linux'
        uses: ./.github/actions/setup-python-env

      - name: Test (Linux container)
        if: runner.os == 'Linux'
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/px -w /px \
            ${{ matrix.container }} /bin/sh -c '. /px/build.sh && test_binary ${{ matrix.name }}'

      - name: Test (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        env:
          PX_CI_MINIMAL: ${{ runner.os == 'macOS' && '1' || '' }}
        run: . ./build.sh && test_binary ${{ matrix.name }}

  # Tag, create GitHub release, and publish to PyPI
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [setup, test-binary]
    permissions:
      id-token: write
      contents: write
    environment: pypi

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: binary-*

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: artifacts/sdist/

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts/binary-* -name 'px-v*' -exec cp {} release/ \;
          cp artifacts/sdist/*.tar.gz release/ || true
          cp artifacts/sdist/*.whl release/ || true

      - name: Extract release notes
        run: python3 tools.py --history > /tmp/notes.md

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ needs.setup.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: Px v${{ needs.setup.outputs.version }}
          body_path: /tmp/notes.md
          files: release/*
          prerelease: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/sdist/

      # Build and push Docker images
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        run: python3 tools.py --docker --push --wheels-dir=artifacts/binary-linux-musl-x86_64/px.dist-linux-musl-x86_64-wheels

      - name: Publish to Winget
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: genotrance.px
          version: ${{ needs.setup.outputs.version }}
          installers-regex: '-windows-amd64\.zip$'
          release-tag: v${{ needs.setup.outputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}
