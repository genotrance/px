name: CI

on:
  push:
    branches: [devel, working]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: make check

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: ubuntu-24.04-arm
            python-version: "3.10"
          - os: ubuntu-24.04-arm
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"
      fail-fast: false
    defaults:
      run:
        shell: bash
    name: test ${{ matrix.os }} py${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        timeout-minutes: 60
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            PX_CI_MINIMAL=1 uv run python -m pytest tests -n auto --tb=short -q --ignore=tests/test_network.py
          else
            uv run python -m pytest tests -n auto --tb=short -q
          fi

  tests-musl:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            image: "quay.io/pypa/musllinux_1_2_x86_64"
            name: musl-x86_64
            pyver: "310"
          - os: ubuntu-latest
            image: "quay.io/pypa/musllinux_1_2_x86_64"
            name: musl-x86_64
            pyver: "314"
          - os: ubuntu-24.04-arm
            image: "quay.io/pypa/musllinux_1_2_aarch64"
            name: musl-aarch64
            pyver: "310"
          - os: ubuntu-24.04-arm
            image: "quay.io/pypa/musllinux_1_2_aarch64"
            name: musl-aarch64
            pyver: "314"
    runs-on: ${{ matrix.os }}
    name: test ${{ matrix.name }} py${{ matrix.pyver }}
    steps:
      - uses: actions/checkout@v6

      - name: Run tests in musllinux container
        timeout-minutes: 60
        run: |
          docker run --rm -v ${{ github.workspace }}:/px -w /px \
            ${{ matrix.image }} /bin/bash -c '
              PY=/opt/python/cp${{ matrix.pyver }}-cp${{ matrix.pyver }}/bin/python3
              if [ ! -f "$PY" ]; then echo "Python ${{ matrix.pyver }} not found"; exit 1; fi
              curl -LsSf https://astral.sh/uv/install.sh | sh
              . ~/.local/bin/env
              "$PY" -m venv /tmp/test-env
              . /tmp/test-env/bin/activate
              uv pip install -e .
              uv pip install keyring keyrings.alt psutil pytest pytest-xdist pytest-httpbin pytest-cov
              python -m pytest tests -n auto --tb=short -q
            '

  large-data-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run large data transfer tests
        timeout-minutes: 15
        run: make test-large-data

  large-data-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run large data transfer tests
        timeout-minutes: 15
        run: uv run python -m pytest tests/test_large_data.py -m largedata -v -s

  kerberos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Build Docker images
        run: make docker-kerberos

      - name: Run Kerberos integration tests
        timeout-minutes: 10
        run: uv run python -m pytest tests/test_kerberos.py -m integration -v
